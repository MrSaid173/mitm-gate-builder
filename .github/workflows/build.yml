name: Build static mitm_gate

on:
  push:
    branches: [ main ]
  workflow_dispatch:    # позволяет запускать вручную из веб-интерфейса

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Download dependencies
        run: go mod tidy

      - name: Build static binary for ARM64
        env:
          GOOS: linux
          GOARCH: arm64
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w -extldflags=-static" -o mitm_gate .
          file mitm_gate
          readelf -d mitm_gate | grep NEEDED || echo "✅ Statically linked"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mitm_gate
          path: mitm_gate
